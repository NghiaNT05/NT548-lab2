version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - python -m pip install --upgrade pip
      - pip install "setuptools<81"
      - pip install "cfn-lint[junit]==1.47.1" "taskcat==0.9.58"
      - mkdir -p reports taskcat_outputs

  pre_build:
    commands:
      - cfn-lint -f junit cloudformation/*.yaml > reports/cfn-lint.xml
      - cfn-lint cloudformation/*.yaml 2>&1 | tee reports/cfn-lint.txt

  build:
    commands:
      - taskcat test run --output-directory taskcat_outputs 2>&1 | tee reports/taskcat.txt

artifacts:
  files:
    - "**/*"
    - "reports/**/*"
    - "taskcat_outputs/**/*"

cache:
  paths:
    - "/root/.cache/pip/**/*"

reports:
  cfn-lint-report:
    files:
      - "cfn-lint.xml"
    base-directory: reports
    file-format: JUNITXML
